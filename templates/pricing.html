{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <h2>Choose a Plan</h2>
    <div class="row">
        {% for plan in plans %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <h5>{{ plan.name }}</h5>
                    <p class="h4">₦{{ plan.price|floatformat:2 }}</p>
                    <button class="btn btn-primary paystack-btn"
                        data-plan="{{ plan.name }}"
                        data-email="{{ request.user.email }}"
                        data-amount="{{ plan.price|floatformat:0|add:'00' }}">
                        Pay with Paystack
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
const payButtons = document.querySelectorAll('.paystack-btn');

payButtons.forEach(btn => {
    btn.addEventListener('click', function() {
        const planName = this.dataset.plan;
        const email = this.dataset.email;
        const amount = parseInt(this.dataset.amount); // amount in kobo

        var handler = PaystackPop.setup({
            key: '{{ PAYSTACK_PUBLIC_KEY }}',
            email: email,
            amount: amount,
            currency: "NGN",
            callback: function(response){
                fetch("{% url 'paystack_verify' %}", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({reference: response.reference, plan: planName})
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success"){
                        alert("Payment successful! Plan upgraded.");
                        window.location.href = "{% url 'dashboard' %}";
                    } else {
                        alert("Payment failed. Try again.");
                    }
                });
            },
            onClose: function(){
                alert('Payment window closed.');
            }
        });
        handler.openIframe();
    });
});
</script>
{% endblock %}
