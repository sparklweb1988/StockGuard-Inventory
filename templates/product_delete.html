{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow-sm">

<h4>Delete Product</h4>

<p>
Are you sure you want to delete <strong>{{ product.name }}</strong>?
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Yes, Delete
    </button>

    <a href="{% url 'product_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

</div>

{% endblock %}
